<title>天晴忍法帖（スマホ版）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden; background: #7ec8f0;
    color: #eaf1fb;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; overscroll-behavior: none;
  }
  #stage { position: fixed; inset: 0; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
  }
  .stat { display: flex; flex-direction: column; line-height: 1; }
  .stat .label { font-size: 11px; letter-spacing: .18em; color: #1d4e7a; font-weight: 800; margin-bottom: 4px; }
  .stat .val { font-size: 26px; font-weight: 900; color: #15365c; text-shadow: 0 1px 0 rgba(255,255,255,.7); }
  .stat.mid { align-items: center; } .stat.mid .val { color: #b8651b; }
  .stat.right { align-items: flex-end; } .stat.right .val { color: #b8651b; }
  .hidden { display: none !important; }

  /* touch controls */
  #controls { position: absolute; inset: 0; pointer-events: none; }
  .ctl {
    position: absolute; pointer-events: auto; border-radius: 50%;
    border: 3px solid rgba(21,54,92,.5); background: rgba(255,255,255,.4);
    display: flex; align-items: center; justify-content: center;
    color: #15365c; font-weight: 900; backdrop-filter: blur(2px);
    transition: background .06s, transform .06s; touch-action: none;
  }
  .ctl.pressed { background: rgba(255,213,107,.8); transform: scale(.93); }
  #btnJ.rescue { background: rgba(120,200,255,.85); border-color: #1f6fb0; box-shadow: 0 0 18px rgba(80,180,255,.9); }
  .ctl svg { width: 46%; height: 46%; fill: #15365c; }
  #btnL { left: max(16px, env(safe-area-inset-left)); bottom: max(18px, env(safe-area-inset-bottom)); width: 82px; height: 82px; }
  #btnR { left: calc(max(16px, env(safe-area-inset-left)) + 96px); bottom: max(18px, env(safe-area-inset-bottom)); width: 82px; height: 82px; }
  #btnJ { right: max(16px, env(safe-area-inset-right)); bottom: max(18px, env(safe-area-inset-bottom)); width: 100px; height: 100px; font-size: 20px; }
  #btnT { right: calc(max(16px, env(safe-area-inset-right)) + 114px); bottom: max(26px, env(safe-area-inset-bottom)); width: 74px; height: 74px; font-size: 15px; }
  @media (max-height: 450px) {
    #btnL, #btnR { width: 68px; height: 68px; }
    #btnR { left: calc(max(16px, env(safe-area-inset-left)) + 80px); }
    #btnJ { width: 84px; height: 84px; }
    #btnT { width: 62px; height: 62px; right: calc(max(16px, env(safe-area-inset-right)) + 96px); }
  }

  /* overlays */
  .screen {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    color: #15365c; padding: 20px; gap: 12px; overflow-y: auto;
    background: rgba(190, 228, 248, .82); backdrop-filter: blur(2px);
  }
  .title { font-size: clamp(30px, 10vw, 52px); font-weight: 900; letter-spacing: .04em; color: #0e2c4e; text-shadow: 3px 3px 0 #ffd56b; }
  .subtitle { font-size: 12px; letter-spacing: .4em; color: #3a6ea5; margin-top: -4px; font-weight: 700; }
  .keys { font-size: 14px; line-height: 1.7; color: #1d4e7a; }
  .keys b { color: #b8651b; }
  .panel {
    background: rgba(255,255,255,.55); border: 2px solid rgba(21,54,92,.3); border-radius: 12px;
    padding: 10px 16px; font-size: 12px; color: #15365c; line-height: 1.7;
    font-family: "SFMono-Regular", "Consolas", monospace;
  }
  .panel .k { color: #3a6ea5; }
  .panel .v { color: #b8651b; font-weight: 800; }
  .btn {
    margin-top: 6px; padding: 14px 44px; border: none; border-radius: 999px;
    font-family: inherit; font-size: 18px; font-weight: 900; letter-spacing: .06em;
    color: #fff; cursor: pointer; background: linear-gradient(180deg, #ff9d4d, #e8632a);
    box-shadow: 0 5px 0 #b8651b; pointer-events: auto;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8651b; }
  .result { font-size: 13px; color: #3a6ea5; letter-spacing: .25em; font-weight: 800; }
  .bignum { font-size: clamp(40px, 14vw, 70px); font-weight: 900; color: #0e2c4e; text-shadow: 2px 2px 0 #ffd56b; line-height: 1; }
  .bignum .u { font-size: .4em; color: #b8651b; margin-left: 4px; }
  .resrow { display: flex; gap: 24px; }
  .resitem { display: flex; flex-direction: column; gap: 3px; }
  .resitem .k { font-size: 11px; letter-spacing: .2em; color: #3a6ea5; font-weight: 800; }
  .resitem .v { font-size: 22px; font-weight: 900; color: #b8651b; }
  .best { font-size: 13px; color: #3a6ea5; font-weight: 700; }
  .modewrap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .modelabel { font-size: 12px; letter-spacing: .2em; color: #3a6ea5; font-weight: 800; }
  .itembtn {
    padding: 8px 14px; border-radius: 10px; border: 2px solid rgba(21,54,92,.25);
    background: rgba(255,255,255,.45); font-family: inherit; font-size: 14px; font-weight: 800;
    color: #9fb0c4; cursor: pointer; opacity: .7; transition: all .12s; pointer-events: auto;
  }
  .itembtn::before { content: "OFF　"; font-size: 10px; letter-spacing: .05em; }
  .itembtn.on { background: #ffd56b; border-color: #b8651b; color: #5c3008; opacity: 1; box-shadow: 0 3px 0 #b8651b; }
  .itembtn.on::before { content: "ON　"; }
  .itembtn:active { transform: translateY(1px); }
  .record { font-size: 18px; font-weight: 900; color: #e8632a; letter-spacing: .1em; animation: pop 1s ease-in-out infinite; }
  @keyframes pop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="stat"><span class="label">DISTANCE</span><span class="val"><span id="dist">0</span>m</span></div>
    <div class="stat mid"><span class="label">撃破</span><span class="val">×<span id="kills">0</span></span></div>
    <div class="stat right"><span class="label">小判</span><span class="val">×<span id="coins">0</span></span></div>
  </div>

  <div id="controls" class="hidden">
    <div class="ctl" id="btnL"><svg viewBox="0 0 24 24"><path d="M15.5 4 7 12l8.5 8V4z"/></svg></div>
    <div class="ctl" id="btnR"><svg viewBox="0 0 24 24"><path d="M8.5 4 17 12l-8.5 8V4z"/></svg></div>
    <div class="ctl" id="btnT">裏剣</div>
    <div class="ctl" id="btnJ">跳</div>
  </div>

  <div id="startScreen" class="screen">
    <div class="title">天晴忍法帖</div>
    <div class="subtitle">S M A R T P H O N E</div>
    <div class="keys">
      <div><b>◀ ▶</b> 移動 &nbsp; <b>跳</b> ジャンプ &nbsp; <b>裏剣</b> 手裏剣</div>
      <div>敵は踏むか手裏剣で倒す。穴に落ちたら <b>跳</b> で1回だけ復帰。</div>
    </div>
    <div class="panel" id="curSettings"></div>
    <div class="modewrap">
      <span class="modelabel">アイテム</span>
      <button class="itembtn" data-item="inv">★ 無敵</button>
      <button class="itembtn" data-item="rapid">✦ 連射</button>
      <button class="itembtn" data-item="magnet">🧲 磁石</button>
      <button class="itembtn" data-item="slow">⏱ スロー</button>
    </div>
    <div class="best">ハイスコア &nbsp;<span id="bestStart">0</span> &nbsp;pts</div>
    <button class="btn" id="startBtn">スタート</button>
  </div>

  <div id="overScreen" class="screen hidden">
    <div class="result">到達距離</div>
    <div class="bignum"><span id="finalDist">0</span><span class="u">m</span></div>
    <div class="resrow">
      <div class="resitem"><span class="k">小判</span><span class="v">×<span id="finalCoins">0</span></span></div>
      <div class="resitem"><span class="k">撃破</span><span class="v">×<span id="finalKills">0</span></span></div>
      <div class="resitem"><span class="k">スコア</span><span class="v" id="finalScore">0</span></div>
    </div>
    <div id="recordBadge" class="record hidden">★ ハイスコア更新！ ★</div>
    <div class="best">ハイスコア &nbsp;<span id="bestOver">0</span> &nbsp;pts</div>
    <button class="btn" id="retryBtn">もう一度</button>
  </div>
</div>

<script>
/* ============================================================
   ▼▼▼  いじってみよう！ここの数字や色をかえて保存→ブラウザ更新  ▼▼▼

   使い方：
     1. このファイルをメモ帳で開く
     2. 下の数字や色をかえる
     3. 上書き保存（Ctrl+S）
     4. ブラウザに戻って 更新（F5 / Ctrl+R）

   ※ 「ここから下はゲーム本体」より下は、慣れるまで触らなくてOK。
   ============================================================ */

const SETTINGS = {

  /* ===== レベル1：まずは数字をかえてみよう ===== */
  jumpPower:   890,   // ジャンプの強さ（大きいほど高く跳ぶ。例:1200）
  moveSpeed:   360,   // 横移動の速さ（大きいほど速い。例:500）
  gravity:    2950,   // 重力（大きいほど速く落ちる。小さいとふわふわ。例:2000）
  jumpCount:     2,   // 空中もふくめ何回跳べるか（2=二段, 3=三段跳び）
  coinScore:    10,   // 小判1枚の点数
  killScore:    30,   // 敵を1体たおした点数

  /* ===== レベル2：色や、出てくる敵のオン/オフ・速さ ===== */
  // 色は "#RRGGBB" の形。https://www.google.com/search?q=color+picker などで選べる
  colorSkyTop:    "#5fb6ee",  // 空の上のほうの色
  colorSkyBottom: "#eaf8ff",  // 空の下のほうの色
  colorHills:     "#7cc56a",  // 丘の色
  colorRoof:      "#3f6fae",  // 屋根（足場）の色
  colorNinja:     "#2a3d6b",  // 忍者の体の色
  colorScarf:     "#e8483f",  // 忍者のマフラーの色
  colorCoin:      "#ffd34d",  // 小判の色

  enableRockets:  true,   // true=ロケットが飛んでくる / false=出さない
  enableStairs:   true,   // true=階段を出す / false=出さない
  soundOn:        true,   // true=効果音を鳴らす / false=消す
  soundVolume:    0.5,    // 音の大きさ（0〜1。0.5 くらいがちょうどよい）

  walkerSpeed:    75,     // 地上の敵（河童）の速さ
  runnerSpeedMul: 2.3,    // 速い敵（赤鬼）は河童の何倍速いか
  flyerSpeedMin:  160,    // 空の敵（カラス）の速さ・最小
  flyerSpeedMax:  250,    // 同・最大
  rocketSpeedMin: 380,    // ロケットの速さ・最小
  rocketSpeedMax: 470,    // 同・最大

  gapChance:      0.72,   // 0〜1。穴があく確率（大きいほど穴が増える）
  gapMin:         85,     // 穴の最小はば
  gapMax:        200,     // 穴の最大はば
  enemyChance:    0.45,   // 0〜1。足場に地上の敵が出る確率
  runnerChance:   0.28,   // 0〜1。地上の敵が「速い赤鬼」になる確率
  flyerEveryMin:  3.8,    // カラスが出る間隔（秒）・最短
  flyerEveryMax:  6.5,    // 同・最長

  /* ===== アイテム（スタート画面で「アイテムあり」を選んだときに出る） ===== */
  // どのアイテムを出すか（true=出す / false=出さない）
  itemInvincible: true,   // 無敵（星）：しばらく敵にやられない
  itemRapid:      true,   // 連射（三つ手裏剣）：手裏剣が自動で連射になる
  itemMagnet:     true,   // 磁石：まわりの小判を引き寄せる
  itemSlow:       true,   // スロー（時計）：敵の動きが遅くなる
  itemChance:     0.14,   // 0〜1。足場にアイテムが出る確率
  // 効果の長さ（秒）
  timeInvincible: 6,
  timeRapid:      7,
  timeMagnet:     7,
  timeSlow:       5,
};

/* ============================================================
   ▼ レベル3：自分でルールを書きかえてみよう（少し上級）
   この myRule は毎フレーム自動で呼ばれます。
   下の例の行頭の // を消すと、その動きが有効になります。
   ============================================================ */
function myRule(api) {
  // api.dist        … いま進んだ距離(m)
  // api.coins       … 集めた小判の数
  // api.kills       … たおした敵の数
  // api.setSpeed(v) … 横移動の速さをその場で変える
  // api.setGravity(v)… 重力をその場で変える
  // api.dropCoin()  … 前方に小判を1枚出す

  // 例1）小判を集めるほど、だんだん速くなる：
  // api.setSpeed(360 + api.coins * 15);

  // 例2）200mをこえたら重力を軽くして、ふわっと跳べる：
  // if (api.dist > 200) api.setGravity(2000);

  // 例3）走っているとどんどん小判がこぼれ落ちてくる：
  // if (Math.random() < 0.04) api.dropCoin();
}

/* ============================================================
   ▼▼▼  ここから下はゲーム本体（慣れるまで触らなくてOK）  ▼▼▼
   ============================================================ */
(function () {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // 画面いっぱいに合わせる（回転にも対応）
  let W = window.innerWidth, H = window.innerHeight, dpr = 1, S = H / 800;
  function applyCanvasSize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  applyCanvasSize();

  let PW = 44 * S, PH = 62 * S;
  const MAX_JUMPS = () => Math.max(1, SETTINGS.jumpCount | 0);

  let state = "ready";
  let platforms, coins, obstacles, enemies, puffs, sparks, shurikens, items;
  let genX, baseY, curY, genCount, cam, elapsed, flyerTimer, rocketTimer;
  let player, coinCount, killCount, maxX, throwCd;
  let curMove, curGrav;          // レベル3で書き換えられる実行時の値
  // アイテムごとの ON/OFF（初期値は SETTINGS。スタート画面のボタンで切り替え）
  const itemEnabled = { inv: SETTINGS.itemInvincible, rapid: SETTINGS.itemRapid, magnet: SETTINGS.itemMagnet, slow: SETTINGS.itemSlow };
  const anyItemOn = () => itemEnabled.inv || itemEnabled.rapid || itemEnabled.magnet || itemEnabled.slow;
  let lastT = 0;

  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);

  // 画面サイズが変わったとき、ゲーム世界の座標を新しい縮尺に合わせて変換する
  function rescaleWorld(r) {
    if (!player) return;
    player.x *= r; player.y *= r; player.vy *= r;
    if (player.vx) player.vx *= r;
    if (player.lastGroundY) player.lastGroundY *= r;
    for (const p of platforms) { p.x *= r; p.y *= r; p.w *= r; if (p.decoX) p.decoX *= r; }
    for (const c of coins) { c.x *= r; c.y *= r; }
    for (const o of obstacles) { o.x *= r; o.y *= r; o.w *= r; o.h *= r; }
    for (const e of enemies) { e.x *= r; e.y *= r; e.x0 *= r; e.x1 *= r; e.baseY *= r; e.w *= r; e.h *= r; if (e.spd) e.spd *= r; if (e.amp) e.amp *= r; }
    for (const it of items) { it.x *= r; it.y *= r; }
    for (const sk of shurikens) { sk.x *= r; sk.y *= r; sk.vx *= r; sk.born *= r; }
    for (const q of puffs) { q.x *= r; q.y *= r; q.vx *= r; q.vy *= r; q.r *= r; }
    for (const q of sparks) { q.x *= r; q.y *= r; q.vx *= r; q.vy *= r; q.r *= r; }
    genX *= r; cam *= r; curY *= r; baseY *= r; maxX *= r;
  }
  function resize() {
    const oldS = S;
    W = window.innerWidth; H = window.innerHeight;
    applyCanvasSize();
    S = H / 800;
    if (oldS && Math.abs(S - oldS) > 1e-6) {
      rescaleWorld(S / oldS);
      PW = 44 * S; PH = 62 * S;
      if (state === "playing" && player) curY = clamp(curY, H * 0.50, H * 0.84);
    }
  }
  window.addEventListener("resize", () => setTimeout(resize, 60));
  window.addEventListener("orientationchange", () => setTimeout(resize, 200));

  // ---------- 効果音（Web Audio・外部ファイル不要） ----------
  let audioCtx = null;
  function initAudio() {
    if (audioCtx || !window.AudioContext && !window.webkitAudioContext) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  // かんたんな「ピコッ」という音を鳴らす（type: 波形, f0→f1: 音の高さ変化, dur: 長さ秒）
  function beep(f0, f1, dur, type, vol) {
    if (!SETTINGS.soundOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || "square";
    osc.frequency.setValueAtTime(f0, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(1, f1), now + dur);
    const v = clamp(SETTINGS.soundVolume, 0, 1) * (vol == null ? 1 : vol);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, v), now + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + dur + 0.02);
  }
  const SFX = {
    jump:  () => beep(420, 720, 0.14, "square", 0.5),
    coin:  () => beep(900, 1500, 0.10, "triangle", 0.5),
    kick:  () => beep(300, 900, 0.18, "sawtooth", 0.5),
    throw: () => beep(700, 300, 0.08, "square", 0.35),
    kill:  () => beep(600, 160, 0.16, "square", 0.6),
    over:  () => { beep(400, 120, 0.30, "sawtooth", 0.6); setTimeout(() => beep(300, 80, 0.40, "sawtooth", 0.6), 120); },
    record:() => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, f, 0.12, "triangle", 0.5), i * 110)); },
    power: () => { [660, 880, 1170].forEach((f, i) => setTimeout(() => beep(f, f, 0.09, "triangle", 0.5), i * 60)); },
  };

  // ---------- ハイスコア（localStorage に保存） ----------
  const BEST_KEY = "tenaHighScore";
  let best = 0, newRecord = false;
  function loadBest() { try { best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0; } catch (e) { best = 0; } }
  function saveBest(v) { try { localStorage.setItem(BEST_KEY, String(v)); } catch (e) {} }

  function reset() {
    platforms = []; coins = []; obstacles = []; enemies = []; puffs = []; sparks = []; shurikens = []; items = [];
    baseY = H * 0.78; curY = baseY; genX = 0; genCount = 0;
    cam = 0; elapsed = 0; coinCount = 0; killCount = 0; throwCd = 0;
    curMove = SETTINGS.moveSpeed; curGrav = SETTINGS.gravity;
    flyerTimer = rand(SETTINGS.flyerEveryMin, SETTINGS.flyerEveryMax) + 2;
    rocketTimer = rand(7, 13);
    platforms.push({ x: 0, w: 820 * S, y: baseY });
    genX = 820 * S; genCount = 1;
    player = { x: 220 * S, y: baseY - PH, vy: 0, vx: 0, jumps: 0, onGround: true, runPhase: 0, face: 1, lastGroundY: baseY, kicksLeft: 1,
               inv: 0, rapid: 0, magnet: 0, slow: 0, rapidCd: 0 };
    maxX = player.x;
    while (genX < cam + W * 2.2) generateNext();
  }

  // どのアイテムを出すか候補から1つ選ぶ（ボタンで ON にしたものだけ）
  function pickItemType() {
    const pool = [];
    if (itemEnabled.inv) pool.push("inv");
    if (itemEnabled.rapid) pool.push("rapid");
    if (itemEnabled.magnet) pool.push("magnet");
    if (itemEnabled.slow) pool.push("slow");
    return pool.length ? pool[Math.floor(Math.random() * pool.length)] : null;
  }

  // ---------- world generation ----------
  function generateNext() {
    if (SETTINGS.enableStairs && genCount > 4 && Math.random() < 0.2) { generateStairs(); return; }
    let gap = 0;
    if (genCount > 2 && Math.random() < SETTINGS.gapChance) gap = rand(SETTINGS.gapMin, SETTINGS.gapMax) * S;
    genX += gap;

    let dy = rand(-1, 1) * (gap > 0 ? 92 : 60) * S;
    let newY = clamp(curY + dy, H * 0.50, H * 0.84);
    let w = rand(240, 500) * S;
    platforms.push({ x: genX, w, y: newY });

    if (gap > 60 * S && Math.random() < 0.85) {
      const startX = genX - gap, n = Math.max(3, Math.round(gap / (46 * S)));
      for (let i = 0; i <= n; i++) {
        const t = i / n, arc = -Math.sin(t * Math.PI) * 110 * S;
        coins.push({ x: startX + gap * t, y: (curY + (newY - curY) * t) + arc - 30 * S, got: false });
      }
    } else if (Math.random() < 0.75) {
      const n = Math.floor(rand(3, 7)), startX = genX + w * rand(0.18, 0.32);
      for (let i = 0; i < n; i++) coins.push({ x: startX + i * 46 * S, y: newY - 36 * S, got: false });
    }

    let chimX = -1;
    if (genCount > 3 && w > 330 * S && Math.random() < 0.38) {
      const oh = rand(58, 86) * S;
      chimX = genX + w * rand(0.55, 0.72);
      obstacles.push({ x: chimX, y: newY - oh, w: 40 * S, h: oh });
    }

    if (genCount > 3 && w > 280 * S && Math.random() < SETTINGS.enemyChance) {
      let x0 = genX + 40 * S, x1 = genX + w - 40 * S;
      if (chimX > 0) x1 = Math.min(x1, chimX - 30 * S);
      if (x1 - x0 > 110 * S) {
        const fast = Math.random() < SETTINGS.runnerChance;
        enemies.push({
          type: fast ? "runner" : "walker", x: rand(x0 + 20 * S, x1 - 20 * S), y: newY,
          x0, x1, dir: Math.random() < 0.5 ? -1 : 1,
          spd: (fast ? SETTINGS.walkerSpeed * SETTINGS.runnerSpeedMul : SETTINGS.walkerSpeed) * S,
          w: fast ? 42 * S : 46 * S, h: fast ? 44 * S : 40 * S, baseY: newY, dead: false, deadT: 0, phase: rand(0, 6)
        });
      }
    }
    if (anyItemOn() && genCount > 3 && w > 260 * S && Math.random() < SETTINGS.itemChance) {
      const type = pickItemType();
      if (type) items.push({ type, x: genX + w * rand(0.35, 0.65), y: newY - 66 * S, got: false, phase: rand(0, 6) });
    }

    assignDeco(platforms[platforms.length - 1]);
    genX += w; curY = newY; genCount++;
  }

  function generateStairs() {
    const up = Math.random() < 0.62, steps = Math.floor(rand(3, 6));
    const stepW = rand(42, 58) * S, stepH = rand(24, 36) * S;
    let y = curY;
    platforms.push({ x: genX, w: rand(70, 120) * S, y }); genX += platforms[platforms.length - 1].w;
    for (let i = 0; i < steps; i++) {
      y = clamp(y + (up ? -stepH : stepH), H * 0.42, H * 0.86);
      platforms.push({ x: genX, w: stepW, y, stair: true });
      coins.push({ x: genX + stepW * 0.5, y: y - 34 * S, got: false });
      genX += stepW;
    }
    const w = rand(220, 380) * S, plat = { x: genX, w, y };
    platforms.push(plat); assignDeco(plat);
    genX += w; curY = y; genCount++;
  }

  function assignDeco(p) {
    if (!p || p.w < 200 * S || Math.random() > 0.5) return;
    const r = Math.random();
    p.deco = r < 0.5 ? "lantern" : "banner";
    p.decoX = p.x + p.w * rand(0.2, 0.8);
  }

  function spawnFlyer() {
    const y = rand(H * 0.22, H * 0.62);
    enemies.push({ type: "flyer", x: cam + W + 80 * S, y, baseY: y, dir: -1,
      spd: rand(SETTINGS.flyerSpeedMin, SETTINGS.flyerSpeedMax) * S,
      amp: rand(26, 70) * S, frq: rand(2.2, 4.2), w: 50 * S, h: 34 * S, dead: false, deadT: 0, phase: rand(0, 6) });
  }
  function spawnRocket() {
    const y = clamp(player.y + PH * 0.4 + rand(-90, 50) * S, H * 0.20, H * 0.74);
    enemies.push({ type: "rocket", x: cam + W + 100 * S, y, baseY: y, dir: -1,
      spd: rand(SETTINGS.rocketSpeedMin, SETTINGS.rocketSpeedMax) * S,
      amp: rand(4, 16) * S, frq: rand(1.5, 3), w: 64 * S, h: 26 * S, dead: false, deadT: 0, phase: rand(0, 6), fl: 0 });
  }

  function groundTopAt(x) {
    for (const p of platforms) if (x >= p.x && x <= p.x + p.w) return p.y;
    return null;
  }
  function wallCollide(prevBottom) {
    const p = player, footY = p.y + PH, pL = p.x + PW * 0.18, pR = p.x + PW * 0.82;
    for (const pl of platforms) {
      if (pl.y >= footY - 6 * S) continue;
      if (footY <= pl.y) continue;
      if (prevBottom !== undefined && prevBottom <= pl.y + 1) continue;
      if (pR <= pl.x || pL >= pl.x + pl.w) continue;
      const penL = pR - pl.x, penR = (pl.x + pl.w) - pL;
      if (penL < penR) p.x -= penL; else p.x += penR;
    }
  }

  // ---------- input ----------
  const input = { left: false, right: false };
  function jump() {
    const p = player;
    if (p.onGround) { p.vy = -SETTINGS.jumpPower * S; p.onGround = false; p.jumps = 1; spawnPuff(p.x + PW / 2, p.y + PH, 8); SFX.jump(); }
    else if (inPit() && p.kicksLeft > 0) {
      p.vy = -SETTINGS.jumpPower * S * 1.18; p.vx = -p.face * 440 * S; p.kicksLeft--;
      spawnPuff(p.x + PW / 2, p.y + PH * 0.7, 10); spawnSpark(p.x + PW / 2, p.y + PH * 0.6, "#bfe3ff"); SFX.kick();
    } else if (p.jumps < MAX_JUMPS()) { p.vy = -SETTINGS.jumpPower * S * 0.85; p.jumps++; spawnPuff(p.x + PW / 2, p.y + PH * 0.6, 6, true); SFX.jump(); }
  }
  function jumpCut() { if (state === "playing" && player.vy < -260 * S) player.vy = -260 * S; }
  function inPit() {
    const p = player;
    if (p.vy <= 0) return false;
    if (groundTopAt(p.x + PW / 2) !== null) return false;
    return (p.y + PH) > p.lastGroundY + 24 * S;
  }
  function throwShuriken() {
    if (state !== "playing" || throwCd > 0) return;
    throwCd = 0.35;
    const p = player;
    shurikens.push({ x: p.x + PW / 2 + p.face * PW * 0.4, y: p.y + PH * 0.38, vx: p.face * 760 * S, born: p.x, rot: 0 });
    SFX.throw();
  }

  addEventListener("keydown", e => {
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " "].includes(e.key)) e.preventDefault();
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    if (e.repeat) return;
    if (e.key === "ArrowLeft" || e.key === "a") input.left = true;
    if (e.key === "ArrowRight" || e.key === "d") input.right = true;
    if (e.key === " " || e.key === "ArrowUp" || e.key === "w") {
      if (state === "playing") jump(); else startGame();
    }
    if (e.key === "x" || e.key === "f") throwShuriken();
  });
  addEventListener("keyup", e => {
    if (e.key === "ArrowLeft" || e.key === "a") input.left = false;
    if (e.key === "ArrowRight" || e.key === "d") input.right = false;
    if (e.key === " " || e.key === "ArrowUp" || e.key === "w") jumpCut();
  });

  // ---------- タッチ操作 ----------
  function unlockAudio() { initAudio(); if (audioCtx && audioCtx.state === "suspended") audioCtx.resume(); }
  const btnL = document.getElementById("btnL");
  const btnR = document.getElementById("btnR");
  const btnJ = document.getElementById("btnJ");
  const btnT = document.getElementById("btnT");
  function holdButton(el, key) {
    const down = e => { e.preventDefault(); unlockAudio(); input[key] = true; el.classList.add("pressed"); };
    const up = e => { e.preventDefault(); input[key] = false; el.classList.remove("pressed"); };
    el.addEventListener("pointerdown", down);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("pointerleave", up);
  }
  holdButton(btnL, "left");
  holdButton(btnR, "right");
  btnJ.addEventListener("pointerdown", e => { e.preventDefault(); unlockAudio(); btnJ.classList.add("pressed"); if (state === "playing") jump(); });
  const jUp = () => { btnJ.classList.remove("pressed"); jumpCut(); };
  btnJ.addEventListener("pointerup", jUp);
  btnJ.addEventListener("pointercancel", jUp);
  btnT.addEventListener("pointerdown", e => { e.preventDefault(); unlockAudio(); btnT.classList.add("pressed"); throwShuriken(); });
  const tUp = () => btnT.classList.remove("pressed");
  btnT.addEventListener("pointerup", tUp);
  btnT.addEventListener("pointercancel", tUp);
  // 画面のスクロール/ズームを止める（ボタン以外をタップしたとき）
  document.body.addEventListener("touchstart", e => { if (e.target.tagName !== "BUTTON") e.preventDefault(); }, { passive: false });

  // ---------- UI ----------
  const hud = document.getElementById("hud");
  const startScreen = document.getElementById("startScreen");
  const overScreen = document.getElementById("overScreen");
  const distEl = document.getElementById("dist"), coinsEl = document.getElementById("coins"), killsEl = document.getElementById("kills");

  function showSettings() {
    const s = SETTINGS;
    document.getElementById("curSettings").innerHTML =
      `<span class="k">jumpPower</span> <span class="v">${s.jumpPower}</span> &nbsp; ` +
      `<span class="k">moveSpeed</span> <span class="v">${s.moveSpeed}</span> &nbsp; ` +
      `<span class="k">gravity</span> <span class="v">${s.gravity}</span><br>` +
      `<span class="k">jumpCount</span> <span class="v">${s.jumpCount}</span> &nbsp; ` +
      `<span class="k">coinScore</span> <span class="v">${s.coinScore}</span> &nbsp; ` +
      `<span class="k">sound</span> <span class="v">${s.soundOn ? "ON" : "OFF"}</span>`;
    document.getElementById("bestStart").textContent = best;
  }

  // アイテムのトグルボタン（初期状態を反映し、クリックで ON/OFF）
  document.querySelectorAll(".itembtn").forEach(b => {
    const type = b.dataset.item;
    b.classList.toggle("on", !!itemEnabled[type]);
    b.addEventListener("click", () => {
      itemEnabled[type] = !itemEnabled[type];
      b.classList.toggle("on", itemEnabled[type]);
    });
  });

  const controls = document.getElementById("controls");
  function startGame() {
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    reset(); state = "playing";
    startScreen.classList.add("hidden"); overScreen.classList.add("hidden");
    hud.classList.remove("hidden"); controls.classList.remove("hidden");
  }
  function gameOver() {
    state = "over";
    const distVal = Math.floor((maxX - 220 * S) / (28 * S));
    const score = distVal + coinCount * SETTINGS.coinScore + killCount * SETTINGS.killScore;
    newRecord = score > best;
    if (newRecord) { best = score; saveBest(best); }
    document.getElementById("finalDist").textContent = distVal;
    document.getElementById("finalCoins").textContent = coinCount;
    document.getElementById("finalKills").textContent = killCount;
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bestOver").textContent = best;
    document.getElementById("recordBadge").classList.toggle("hidden", !newRecord);
    overScreen.classList.remove("hidden"); hud.classList.add("hidden"); controls.classList.add("hidden");
    input.left = input.right = false;
    if (newRecord) SFX.record(); else SFX.over();
  }
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("retryBtn").addEventListener("click", startGame);

  // ---------- particles ----------
  function spawnPuff(x, y, n, up) {
    for (let i = 0; i < n; i++) puffs.push({ x: x + rand(-8, 8) * S, y: y + rand(-4, 4) * S,
      vx: rand(-70, 70) * S, vy: (up ? rand(20, 80) : rand(-30, -110)) * S, r: rand(4, 9) * S, life: 1, decay: rand(1.6, 2.6) });
  }
  function spawnSpark(x, y, col) {
    for (let i = 0; i < 10; i++) { const a = Math.random() * Math.PI * 2, sp = rand(60, 230) * S;
      sparks.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(2, 5) * S, life: 1, decay: rand(2.2, 3.4), col: col || "#ffb13d" }); }
  }

  // ---------- レベル3 API ----------
  const ruleApi = {
    get dist() { return Math.floor((maxX - 220 * S) / (28 * S)); },
    get coins() { return coinCount; },
    get kills() { return killCount; },
    setSpeed(v) { if (typeof v === "number" && v > 0) curMove = v; },
    setGravity(v) { if (typeof v === "number" && v > 0) curGrav = v; },
    dropCoin() { coins.push({ x: player.x + W * 0.6, y: player.y - 10 * S, got: false }); }
  };

  // ---------- update ----------
  function update(dt) {
    if (state !== "playing") return;
    elapsed += dt;
    const p = player;

    try { myRule(ruleApi); } catch (err) { /* 学生のコードのミスでも止まらない */ }

    // パワーアップの残り時間を減らす
    if (p.inv > 0) p.inv -= dt;
    if (p.magnet > 0) p.magnet -= dt;
    if (p.slow > 0) p.slow -= dt;
    if (p.rapid > 0) {
      p.rapid -= dt; p.rapidCd -= dt;
      if (p.rapidCd <= 0) {
        p.rapidCd = 0.14;
        shurikens.push({ x: p.x + PW / 2 + p.face * PW * 0.4, y: p.y + PH * 0.38, vx: p.face * 820 * S, born: p.x, rot: 0 });
        SFX.throw();
      }
    }

    let mv = (input.left ? -1 : 0) + (input.right ? 1 : 0);
    if (mv !== 0) { p.x += mv * curMove * S * dt; p.face = mv; if (p.onGround) p.runPhase += curMove * S * dt * 0.032; }
    if (Math.abs(p.vx) > 1) { p.x += p.vx * dt; p.vx *= Math.exp(-6 * dt); } else p.vx = 0;
    p.x = Math.max(p.x, cam + 6 * S);
    wallCollide();

    p.vy += curGrav * S * dt;
    const prevBottom = p.y + PH;
    p.y += p.vy * dt;
    wallCollide(prevBottom);
    p.x = Math.max(p.x, cam + 6 * S);
    const bottom = p.y + PH;

    p.onGround = false;
    if (p.vy >= 0) {
      const gl = groundTopAt(p.x + PW * 0.2), gr = groundTopAt(p.x + PW * 0.8);
      let gtop = (gl !== null && gr !== null) ? Math.min(gl, gr) : (gl !== null ? gl : gr);
      if (gtop !== null && prevBottom <= gtop + 1 && bottom >= gtop) {
        p.y = gtop - PH; p.vy = 0; p.onGround = true; p.jumps = 0; p.lastGroundY = gtop; p.kicksLeft = 1; p.vx = 0;
      }
    }
    if (p.y > H + 130 * S) { gameOver(); return; }

    for (const o of obstacles) {
      if (p.x + PW * 0.82 > o.x && p.x + PW * 0.18 < o.x + o.w && p.y + PH > o.y && p.y < o.y + o.h) {
        if (p.vy >= 0 && prevBottom <= o.y + 8 * S) { p.y = o.y - PH; p.vy = 0; p.onGround = true; p.jumps = 0; p.lastGroundY = o.y; p.kicksLeft = 1; p.vx = 0; }
        else { const penL = (p.x + PW * 0.82) - o.x, penR = (o.x + o.w) - (p.x + PW * 0.18); if (penL < penR) p.x -= penL; else p.x += penR; }
      }
    }

    flyerTimer -= dt;
    if (flyerTimer <= 0) { spawnFlyer(); flyerTimer = rand(SETTINGS.flyerEveryMin, SETTINGS.flyerEveryMax); }
    if (SETTINGS.enableRockets) { rocketTimer -= dt; if (rocketTimer <= 0) { spawnRocket(); rocketTimer = rand(6, 11); } }

    const ef = p.slow > 0 ? 0.45 : 1;   // スロー中は敵の動きを遅く
    for (const e of enemies) {
      if (e.dead) { e.deadT += dt; e.y += 380 * S * dt; continue; }
      if (e.type === "walker" || e.type === "runner") {
        e.x += e.dir * e.spd * dt * ef;
        if (e.x < e.x0) { e.x = e.x0; e.dir = 1; } if (e.x > e.x1) { e.x = e.x1; e.dir = -1; }
      } else if (e.type === "rocket") {
        e.x += e.dir * e.spd * dt * ef; e.y = e.baseY + Math.sin(elapsed * e.frq + e.phase) * e.amp;
        e.fl -= dt; if (e.fl <= 0) { e.fl = 0.018; sparks.push({ x: e.x + e.w * 0.5, y: e.y + rand(-5, 5) * S, vx: rand(40, 140) * S, vy: rand(-30, 30) * S, r: rand(3, 6) * S, life: 1, decay: rand(3.5, 5), col: Math.random() < 0.5 ? "#ffd24d" : "#ff7a2a" }); }
      } else { e.x += e.dir * e.spd * dt * ef; e.y = e.baseY + Math.sin(elapsed * e.frq + e.phase) * e.amp; }
    }

    for (const e of enemies) {
      if (e.dead) continue;
      const ground = (e.type === "walker" || e.type === "runner");
      const ex = e.x - e.w / 2, ey = ground ? e.y - e.h : e.y - e.h / 2;
      if (!(p.x + PW * 0.78 > ex && p.x + PW * 0.22 < ex + e.w && p.y + PH > ey + 3 * S && p.y < ey + e.h)) continue;

      if (sk.hit) continue;
      for (const e of enemies) {
        if (e.dead) continue;
        const ground = (e.type === "walker" || e.type === "runner");
        const ex = e.x - e.w / 2, ey = ground ? e.y - e.h : e.y - e.h / 2;
        if (sk.x > ex && sk.x < ex + e.w && sk.y > ey && sk.y < ey + e.h) { e.dead = true; e.deadT = 0; killCount++; sk.hit = true; spawnSpark(e.x, ey + e.h / 2, "#ff7a4d"); SFX.kill(); break; }
      }

        it.got = true;

        else if (it.type === "rapid") { p.rapid = SETTINGS.timeRapid; p.rapidCd = 0; }
        else if (it.type === "magnet") p.magnet = SETTINGS.timeMagnet;
        else if (it.type === "slow") p.slow = SETTINGS.timeSlow;

    while (genX < cam + W * 2.2) generateNext();
    const cullX = cam - W * 0.8;
    platforms = platforms.filter(pl => pl.x + pl.w > cullX);
    coins = coins.filter(c => !c.got && c.x > cullX);
    obstacles = obstacles.filter(o => o.x + o.w > cullX);
    enemies = enemies.filter(e => e.x > cullX - 100 * S && e.y < H + 200 * S && e.deadT < 2);
    items = items.filter(it => !it.got && it.x > cullX);

  // ---------- draw ----------
  function rr(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

  function drawFlyer(e) {
    const w = e.w, h = e.h; ctx.scale(e.dir < 0 ? 1 : -1, 1);

  function drawNinja() {

  }
  const ITEM_INFO = {

    magnet: { color: "#ff7a6b", ring: "#d63a2a", label: "磁石" },

  function drawItems() {

      const x = it.x - cam; if (x > W + 40 * S || x < -40 * S) continue;

      else if (it.type === "rapid") drawRapidIcon(R * 0.7, info.ring);
      else if (it.type === "magnet") drawMagnetIcon(R * 0.62, info.ring);
      else drawClockIcon(R * 0.66, info.ring);
      ctx.restore();
    }
  }
  function drawStarIcon(r, fill, edge) {
    ctx.fillStyle = fill; ctx.strokeStyle = edge; ctx.lineWidth = 2 * S; ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI / 2 + i * 2 * Math.PI / 5, a2 = a + Math.PI / 5;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  function drawRapidIcon(r, c) {
    ctx.fillStyle = c;
    for (let k = -1; k <= 1; k++) {
      ctx.save(); ctx.translate(k * r * 0.5, 0); ctx.rotate(elapsed * 6); ctx.beginPath();
      for (let i = 0; i < 4; i++) { const a = i * Math.PI / 2; ctx.lineTo(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5); ctx.lineTo(Math.cos(a + Math.PI / 4) * r * 0.2, Math.sin(a + Math.PI / 4) * r * 0.2); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
  }
  function drawMagnetIcon(r, c) {
    ctx.strokeStyle = c; ctx.lineWidth = r * 0.7; ctx.lineCap = "butt";
    ctx.beginPath(); ctx.arc(0, -r * 0.1, r, Math.PI, 0, false); ctx.stroke();
    ctx.lineWidth = 1;
    ctx.fillStyle = c; ctx.fillRect(-r - r * 0.35, -r * 0.1, r * 0.7, r * 0.7);
    ctx.fillRect(r - r * 0.35, -r * 0.1, r * 0.7, r * 0.7);
    ctx.fillStyle = "#fff"; ctx.fillRect(-r - r * 0.35, r * 0.4, r * 0.7, r * 0.2); ctx.fillRect(r - r * 0.35, r * 0.4, r * 0.7, r * 0.2);
  }
  function drawClockIcon(r, c) {
    ctx.strokeStyle = c; ctx.lineWidth = 2.5 * S; ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r * 0.6); ctx.moveTo(0, 0); ctx.lineTo(r * 0.45, r * 0.1); ctx.stroke();
  }

  // 画面上の「効果中パワーアップ」表示
  function drawPowerHUD() {
    if (!player) return;
    const act = [];
    if (player.inv > 0) act.push(["inv", player.inv, SETTINGS.timeInvincible]);
    if (player.rapid > 0) act.push(["rapid", player.rapid, SETTINGS.timeRapid]);
    if (player.magnet > 0) act.push(["magnet", player.magnet, SETTINGS.timeMagnet]);
    if (player.slow > 0) act.push(["slow", player.slow, SETTINGS.timeSlow]);
    if (!act.length) return;
    const bw = 128 * S, bh = 15 * S, gapY = 8 * S, x0 = W / 2 - bw / 2;
    let y0 = 64 * S;
    for (const [type, rem, max] of act) {
      const info = ITEM_INFO[type], frac = clamp(rem / max, 0, 1);
      ctx.fillStyle = "rgba(255,255,255,.65)"; rrFill(x0, y0, bw, bh, bh / 2);
      ctx.fillStyle = info.ring; rrFill(x0, y0, bw * frac, bh, bh / 2);
      ctx.fillStyle = "#15365c"; ctx.font = `800 ${11 * S}px "Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif`;
      ctx.textBaseline = "middle";
      ctx.fillText(info.label, x0 + bw + 8 * S, y0 + bh / 2);
      y0 += bh + gapY;
    }
    ctx.textBaseline = "alphabetic";
  }
  function rrFill(x, y, w, h, r) { r = Math.min(r, w / 2); ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); ctx.fill(); }

  function render() {
    drawSky(); drawSkyline(); drawHills(); drawPlatforms(); drawObstacles(); drawCoins(); drawItems(); drawEnemies(); drawShurikens(); drawParticles();
    if (player) drawNinja();
    drawPowerHUD();
  }

  function frame(now) {
    if (!lastT) lastT = now;
    let dt = (now - lastT) / 1000; lastT = now;
    if (dt > 0.05) dt = 0.05;
    if (state === "ready" || state === "over") elapsed += dt;
    update(dt); render();
    requestAnimationFrame(frame);
  }

  loadBest();
  showSettings();
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
